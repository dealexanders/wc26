<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>World Cup dashboard</title>
  <meta name="description" content="Mundial 2026 match schedule, games and table.">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
  <link rel="stylesheet" href="style.css?v=6">
</head>
<body>
  <header class="top">
    <a href="#home" class="brand" id="brand"></a>
    <nav class="nav" id="nav"></nav>
  </header>
  <main id="app" aria-live="polite"></main>
  <footer id="footer"></footer>
  <dialog id="forecastDialog" class="forecastDialog">
    <div class="forecastDialogHeader">
      <h2 id="forecastDialogTitle">
        Forecast details
      </h2>

      <button
        id="closeForecastDialog"
        type="button"
        aria-label="Close"
      >
        ×
      </button>
    </div>

    <div id="forecastDialogBody"></div>
  </dialog>
  <script src="script.js?v=6"></script>
</body>
</html>
