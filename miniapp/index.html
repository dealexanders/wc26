<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1"
  >
  <title>WC26 Predictions</title>
  <link rel="icon" href="../favicon.ico" sizes="any">
  <link rel="icon" href="../favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">

  <script
    src="https://telegram.org/js/telegram-web-app.js">
  </script>

  <link rel="stylesheet" href="miniapp.css">
</head>

<body>
  <header>
    <h1>WC26 Predictions</h1>
    <p id="userGreeting"></p>
  </header>

  <main>
    <section class="calendar-section">
      <div class="calendar-toolbar">
        <h2 id="calendarTitle">Match calendar</h2>
        <button id="showTodayMatches" type="button">
          Next match day
        </button>
      </div>

      <div id="matchCalendar" class="match-calendar"></div>
    </section>

    <section class="selected-day-section" hidden>
      <h2 id="selectedDayTitle"></h2>
      <div id="matches"></div>
      <div class="selected-day-actions">
        <button id="backToCalendar" type="button" class="day-nav-button back-button">
          Back to Calendar
        </button>
        <button id="nextDayButton" type="button" class="day-nav-button next-day-button">
          Next day →
        </button>
      </div>
    </section>
  </main>

  <script src="miniapp.js?v=13"></script>
</body>
</html>
